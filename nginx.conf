worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    include mime.types;

    server {
        listen ${PORT};
        server_name _;
        root /app;
        index index.php;

        # Quitar /public/ de URLs (solo requests externos)
        if ($request_uri ~ ^/public/) {
            rewrite ^/public/(.+)$ /$1 permanent;
        }

        # Quitar extension .php (solo requests externos)
        if ($request_uri ~ ^(.+)\.php) {
            rewrite ^(.+)\.php$ $1 permanent;
        }

        # Página principal
        location = / {
            try_files /public/index.php =404;
        }

        # /admin exacto → admin/index.php
        location = /admin {
            try_files /app/admin/index.php =404;
        }

        # /assets/* → public/assets/*
        location ~ ^/assets/ {
            try_files /public$uri =404;
        }

        # PHP handler (antes de admin/public para capturar .php)
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Admin: /admin/X → admin/X.php o admin/X/index.php
        location ~ ^/admin/(.+)$ {
            try_files /app/admin/$1 /app/admin/$1.php /app/admin/$1/index.php =404;
        }

        # Público: /X → public/X.php o public/X/index.php
        location / {
            try_files /public$uri /public$uri.php /public$uri/index.php =404;
        }
    }
}
